name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run unit tests
        run: uv run pytest

  integration:
    name: Integration tests (AF2 + AF3)
    # Opt-in only: boots real Airflow clusters, which is slow. Trigger manually
    # from the Actions tab (Run workflow) when you want the full cross-version check.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run integration tests
        run: uv run --group integration pytest -m integration
